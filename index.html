<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>青空文庫 G2 リーダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 16px;
      min-height: 100vh;
    }
    h1 { font-size: 1.1rem; margin-bottom: 12px; color: #aaa; }

    #status {
      font-size: 0.85rem;
      margin-bottom: 12px;
      color: #f90;
    }

    #sdk-result {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ff0;
      margin-bottom: 12px;
      padding: 8px;
      background: #333;
      border-radius: 4px;
    }

    /* G2 プレビュー: 576×288px 黒背景・緑文字 */
    #preview-container {
      border: 2px solid #444;
      display: inline-block;
      margin-bottom: 12px;
      max-width: 100%;
      overflow-x: auto;
    }
    #preview {
      width: 576px;
      height: 288px;
      background: #000;
      color: #00ff00;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: hidden;
    }

    #page-info {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 16px;
    }

    .panel {
      background: #222;
      border: 1px solid #444;
      padding: 12px;
      display: inline-block;
      border-radius: 6px;
      margin-bottom: 12px;
      vertical-align: top;
    }
    .panel h2 { font-size: 0.9rem; margin-bottom: 10px; color: #aaa; }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .row label { font-size: 0.8rem; color: #888; white-space: nowrap; }

    input[type="text"] {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 220px;
    }

    input[type="number"] {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      width: 60px;
    }

    button {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #444; }
    button:active { background: #555; }
  </style>
</head>
<body>
  <h1>青空文庫 G2 リーダー — デバッグUI</h1>
  <div id="status">初期化中...</div>
  <div id="sdk-result">SDK結果: 待機中</div>

  <div id="preview-container">
    <div id="preview">起動中...</div>
  </div>
  <div id="page-info"></div>

  <!-- 検索パネル（常時表示） -->
  <div class="panel">
    <h2>検索</h2>
    <div class="row">
      <input type="text" id="search-input" placeholder="タイトル・著者名" />
      <button id="btn-search">検索</button>
    </div>
  </div>

  <!-- シミュレーションパネル（モック時のみ表示） -->
  <div class="panel" id="sim-panel">
    <h2>シミュレーション操作</h2>
    <div class="row">
      <button id="btn-click">クリック（決定）</button>
      <button id="btn-scroll-down">下スクロール</button>
      <button id="btn-scroll-up">上スクロール</button>
    </div>
    <div class="row">
      <label>リスト番号:</label>
      <input type="number" id="list-index" value="0" min="0" />
      <button id="btn-list-click">リスト選択</button>
    </div>
  </div>

  <div style="margin-top:12px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:0.8rem;color:#888;">ログ</span>
      <button id="btn-copy-log" style="font-size:0.75rem;padding:3px 10px;">コピー</button>
      <button id="btn-clear-log" style="font-size:0.75rem;padding:3px 10px;">クリア</button>
    </div>
    <div id="log-panel" style="background:#1a1a1a;border:1px solid #444;border-radius:4px;padding:8px;font-family:monospace;font-size:0.75rem;color:#0cf;height:180px;overflow-y:scroll;-webkit-overflow-scrolling:touch;white-space:pre-wrap;word-break:break-all;-webkit-user-select:text;user-select:text;"></div>
  </div>

  <script>
    const logEl = document.getElementById('log-panel');
    const _log = console.log.bind(console);
    const _error = console.error.bind(console);
    const _warn = console.warn.bind(console);
    function appendLog(prefix, args) {
      if (!logEl) return;
      const line = prefix + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      logEl.textContent += line + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }
    console.log = (...args) => { _log(...args); appendLog('', args); };
    console.error = (...args) => { _error(...args); appendLog('[ERR] ', args); };
    console.warn = (...args) => { _warn(...args); appendLog('[WARN] ', args); };

    document.getElementById('btn-copy-log').addEventListener('click', () => {
      const text = logEl.textContent || '';
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const btn = document.getElementById('btn-copy-log');
      btn.textContent = 'コピー済み';
      setTimeout(() => { btn.textContent = 'コピー'; }, 1500);
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => {
      logEl.textContent = '';
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
